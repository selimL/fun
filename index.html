<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #7f5af0, #2cb67d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 8px 18px;
      border: 1px solid #7f5af0;
      border-radius: 6px;
      background: transparent;
      color: #7f5af0;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover { background: #7f5af0; color: #fff; }
    button.active { background: #7f5af0; color: #fff; }

    #status {
      font-size: 1.1rem;
      margin-bottom: 16px;
      min-height: 1.5em;
      text-align: center;
    }

    .x-turn  { color: #7f5af0; }
    .o-turn  { color: #2cb67d; }
    .x-wins  { color: #7f5af0; font-weight: bold; }
    .o-wins  { color: #2cb67d; font-weight: bold; }
    .draw    { color: #f5a623; font-weight: bold; }

    /* Outer 3×3 grid */
    #ultimate-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      background: #1a1a2e;
      border-radius: 12px;
      border: 2px solid #2a2a4a;
    }

    /* Each small board */
    .small-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 6px;
      border-radius: 8px;
      background: #16213e;
      border: 2px solid #2a2a4a;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
    }

    .small-board.active-board {
      border-color: #7f5af0;
      background: #1e1e3a;
      box-shadow: 0 0 12px #7f5af040;
    }

    .small-board.won-x {
      background: #1a0f2e;
      border-color: #7f5af0;
    }

    .small-board.won-o {
      background: #0f1e1a;
      border-color: #2cb67d;
    }

    .small-board.drawn {
      background: #1a1510;
      border-color: #f5a623;
    }

    /* Board winner overlay */
    .board-winner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0.85;
    }

    .board-winner.x { color: #7f5af0; text-shadow: 0 0 20px #7f5af0; }
    .board-winner.o { color: #2cb67d; text-shadow: 0 0 20px #2cb67d; }
    .board-winner.draw { color: #f5a623; font-size: 1.5rem; }

    /* Cells */
    .cell {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: #0f0f1a;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      border: 1px solid #2a2a4a;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #2a2a4a; transform: scale(1.08); }
    .cell.x { color: #7f5af0; cursor: default; }
    .cell.o { color: #2cb67d; cursor: default; }
    .cell.taken { cursor: default; }
    .cell.winning { background: #2a1a4a; }
    .cell.winning.o { background: #0f2a20; }

    .scores {
      display: flex;
      gap: 30px;
      margin-top: 18px;
    }

    .score-box {
      text-align: center;
      padding: 8px 20px;
      border-radius: 8px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
    }

    .score-box .label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .score-box .value { font-size: 1.6rem; font-weight: 700; }
    .score-box.x .value { color: #7f5af0; }
    .score-box.o .value { color: #2cb67d; }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 0.78rem;
      color: #666;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.x { background: #7f5af0; }
    .dot.o { background: #2cb67d; }
  </style>
</head>
<body>

<h1>ULTIMATE XOX</h1>
<p class="subtitle">Win 3 small boards in a row to win the game</p>

<div class="controls">
  <button id="btn-pvp" class="active" onclick="setMode('pvp')">2 Players</button>
  <button id="btn-ai-easy" onclick="setMode('ai-easy')">vs AI (Easy)</button>
  <button id="btn-ai-hard" onclick="setMode('ai-hard')">vs AI (Hard)</button>
  <button onclick="resetGame()">New Game</button>
</div>

<div id="status" class="x-turn">X's turn — click any board to start</div>

<div id="ultimate-board"></div>

<div class="scores">
  <div class="score-box x">
    <div class="label">X WINS</div>
    <div class="value" id="score-x">0</div>
  </div>
  <div class="score-box">
    <div class="label">DRAWS</div>
    <div class="value" id="score-d">0</div>
  </div>
  <div class="score-box o">
    <div class="label">O WINS</div>
    <div class="value" id="score-o">0</div>
  </div>
</div>

<div class="legend">
  <span><div class="dot x"></div> X (Purple)</span>
  <span><div class="dot o"></div> O (Green)</span>
</div>

<script>
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

let mode = 'pvp';
let currentPlayer = 'X';
let activeBoard = null; // null = any board
let bigBoard = Array(9).fill(null);   // winner of each small board
let smallBoards = Array.from({length:9}, () => Array(9).fill(null));
let gameOver = false;
let scores = {X:0, O:0, D:0};

function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  resetGame();
}

function checkWinner(board) {
  for (const [a,b,c] of WINS) {
    if (board[a] && board[a] === board[b] && board[b] === board[c])
      return { winner: board[a], line: [a,b,c] };
  }
  return board.every(c => c) ? { winner: 'D', line: [] } : null;
}

function resetGame() {
  currentPlayer = 'X';
  activeBoard = null;
  bigBoard = Array(9).fill(null);
  smallBoards = Array.from({length:9}, () => Array(9).fill(null));
  gameOver = false;
  renderBoard();
  updateStatus();
}

function renderBoard() {
  const container = document.getElementById('ultimate-board');
  container.innerHTML = '';

  for (let bi = 0; bi < 9; bi++) {
    const sb = document.createElement('div');
    sb.className = 'small-board';
    sb.dataset.board = bi;

    const result = bigBoard[bi];
    if (!result) {
      const isActive = !gameOver && (activeBoard === null || activeBoard === bi);
      if (isActive) sb.classList.add('active-board');
    } else {
      sb.classList.add(result === 'D' ? 'drawn' : (result === 'X' ? 'won-x' : 'won-o'));
      const ov = document.createElement('div');
      ov.className = 'board-winner ' + (result === 'D' ? 'draw' : result.toLowerCase());
      ov.textContent = result === 'D' ? '—' : result;
      sb.appendChild(ov);
    }

    const winResult = result && result !== 'D' ? checkWinner(smallBoards[bi]) : null;

    for (let ci = 0; ci < 9; ci++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.cell = ci;
      const val = smallBoards[bi][ci];
      if (val) {
        cell.textContent = val;
        cell.classList.add(val.toLowerCase(), 'taken');
        if (winResult && winResult.line.includes(ci)) cell.classList.add('winning');
      } else if (!result && !gameOver && (activeBoard === null || activeBoard === bi)) {
        cell.addEventListener('click', () => handleClick(bi, ci));
      }
      sb.appendChild(cell);
    }

    container.appendChild(sb);
  }
}

function handleClick(bi, ci) {
  if (gameOver) return;
  if (bigBoard[bi]) return;
  if (activeBoard !== null && activeBoard !== bi) return;
  if (smallBoards[bi][ci]) return;

  smallBoards[bi][ci] = currentPlayer;

  const sbResult = checkWinner(smallBoards[bi]);
  if (sbResult) bigBoard[bi] = sbResult.winner;

  const bigResult = checkWinner(bigBoard);
  if (bigResult) {
    gameOver = true;
    if (bigResult.winner === 'D') {
      scores.D++;
      document.getElementById('score-d').textContent = scores.D;
      setStatus('draw', "It's a draw!");
    } else {
      scores[bigResult.winner]++;
      document.getElementById('score-' + bigResult.winner.toLowerCase()).textContent = scores[bigResult.winner];
      setStatus(bigResult.winner === 'X' ? 'x-wins' : 'o-wins', `${bigResult.winner} wins the game! 🎉`);
    }
    renderBoard();
    return;
  }

  // Determine next active board
  if (bigBoard[ci]) {
    activeBoard = null; // target board is won — free choice
  } else {
    activeBoard = ci;
  }

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  renderBoard();
  updateStatus();

  if (!gameOver && mode !== 'pvp' && currentPlayer === 'O') {
    setTimeout(doAIMove, 400);
  }
}

function updateStatus() {
  if (gameOver) return;
  const who = currentPlayer === 'X' ? "X (Purple)" : "O (Green)";
  const where = activeBoard !== null ? `→ Board ${activeBoard + 1}` : '→ Any board';
  setStatus(currentPlayer === 'X' ? 'x-turn' : 'o-turn', `${who}'s turn  ${where}`);
}

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = text;
}

// ── AI ──────────────────────────────────────────────────────────────────────

function getAvailableMoves() {
  const moves = [];
  const boards = activeBoard !== null ? [activeBoard] : [...Array(9).keys()];
  for (const bi of boards) {
    if (bigBoard[bi]) continue;
    for (let ci = 0; ci < 9; ci++) {
      if (!smallBoards[bi][ci]) moves.push([bi, ci]);
    }
  }
  return moves;
}

function doAIMove() {
  if (gameOver) return;
  const moves = getAvailableMoves();
  if (!moves.length) return;

  let chosen;
  if (mode === 'ai-easy') {
    chosen = moves[Math.floor(Math.random() * moves.length)];
  } else {
    chosen = getBestMove(moves);
  }
  handleClick(chosen[0], chosen[1]);
}

function getBestMove(moves) {
  // Try to win a small board
  for (const [bi, ci] of moves) {
    const test = [...smallBoards[bi]];
    test[ci] = 'O';
    const r = checkWinner(test);
    if (r && r.winner === 'O') return [bi, ci];
  }
  // Block X from winning a small board
  for (const [bi, ci] of moves) {
    const test = [...smallBoards[bi]];
    test[ci] = 'X';
    const r = checkWinner(test);
    if (r && r.winner === 'X') return [bi, ci];
  }
  // Prefer center cells
  const centers = moves.filter(([,ci]) => ci === 4);
  if (centers.length) return centers[Math.floor(Math.random() * centers.length)];
  // Prefer sending opponent to a won/full board (free move next)
  const free = moves.filter(([,ci]) => !!bigBoard[ci]);
  if (free.length) return free[Math.floor(Math.random() * free.length)];
  // Random
  return moves[Math.floor(Math.random() * moves.length)];
}

// Init
resetGame();
</script>
</body>
</html>
